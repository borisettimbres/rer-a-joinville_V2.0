<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SIEL RER A - Joinville-le-Pont</title>
    <link href="https://fonts.googleapis.com/css2?family=Cabin:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --red-a: #c0333a; 
            --dark: #000000;
            --yellow: #fbc02d; 
            --bg-page: #f5f5f5;
            --grey-border: #666;
            --grey-bg: #eee;
        }
        body { background: var(--bg-page); font-family: 'Cabin', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: white; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 8px solid var(--red-a); }
        
        .header-left { display: flex; align-items: center; }
        .logos-container { display: flex; gap: 8px; align-items: center; }
        
        .logo-rer {
            background: white; border: 2.5px solid var(--dark); border-radius: 8px;
            width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 900; color: var(--dark); box-sizing: border-box;
        }
        
        .logo-a {
            background: var(--red-a); border-radius: 8px;
            width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
            font-size: 36px; font-weight: 900; color: white; box-sizing: border-box;
        }
        
        .station-info { margin-left: 15px; }
        .station-name { font-size: 26px; font-weight: bold; line-height: 1; letter-spacing: -0.5px; color: var(--dark); }
        .direction-info { font-size: 16px; color: var(--red-a); margin-top: 4px; font-weight: bold; letter-spacing: -0.2px; }
        
        .clock { background: var(--dark); color: var(--yellow); padding: 10px 22px; border-radius: 8px; font-size: 28px; font-weight: bold; }
        
        .board { flex-grow: 1; padding: 20px; overflow-y: auto; }
        
        .row { 
            display: grid; 
            grid-template-columns: 100px 1fr 200px 100px; 
            align-items: center; 
            padding: 15px 0; 
            border-bottom: 2px solid #ddd; 
        }
        
        .mission { background: #ddd; padding: 6px; border-radius: 4px; text-align: center; font-weight: bold; font-family: monospace; font-size: 16px; }
        .dest { font-size: 28px; font-weight: 700; padding-left: 15px; color: var(--dark); }
        
        @keyframes updatePop {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }

        .time { 
            background: var(--dark); 
            color: var(--yellow); 
            border-radius: 8px; 
            text-align: center; 
            width: 160px;
            height: 60px; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            justify-self: center;
            animation: updatePop 0.6s ease-out;
        }
        .time .val { font-size: 34px; font-weight: bold; display: block; line-height: 0.8; }
        .time .unit { font-size: 13px; margin-top: 2px; }
        .time .full-text { font-size: 16px; font-weight: bold; line-height: 1.1; text-transform: uppercase; padding: 0 5px; }

        .platform { 
            display: flex;
            justify-content: center;
            border-left: 1px solid #ccc; 
            padding-left: 10px;
        }
        .platform-box {
            background: var(--grey-bg);
            border: 2.5px solid var(--grey-border);
            border-radius: 8px;
            width: 60px; height: 60px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-sizing: border-box; color: var(--dark); line-height: 1;
        }
        .platform-text { font-size: 11px; text-transform: uppercase; font-weight: bold; margin-bottom: 2px; }
        .platform-num { font-size: 24px; font-weight: 900; }

        footer { background: #333; color: #0f0; padding: 10px 20px; font-family: monospace; font-size: 11px; }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <div class="logos-container">
            <div class="logo-rer">RER</div>
            <div class="logo-a">A</div>
        </div>
        <div class="station-info">
            <div class="station-name">JOINVILLE-LE-PONT</div>
            <div class="direction-info">Paris · St-Germain-en-Laye · Poissy · Cergy</div>
        </div>
    </div>
    <div class="clock" id="clock">--:--</div>
</header>

<div class="board" id="board">
    <div style="text-align:center; margin-top:100px; color:#999;" id="status">Chargement...</div>
</div>

<footer id="debug">Prêt.</footer>

<script>
    const API_KEY = '2pz4kMqzVx2zneQWOTnOrqM6muPE1XVO';
    const MONITORING_REF = 'STIF:StopArea:SP:70640:'; 

    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'});
    }

    function formatDestination(text) {
        let clean = text.replace(/GARE DE /gi, '').trim().toLowerCase();
        if (clean === "cergy le haut") return "Cergy - Le Haut";
        return clean.split(/([ -])/).map(part => {
            if (part === " " || part === "-") return part;
            const exceptions = ["de", "la", "le"];
            if (exceptions.includes(part) && clean.indexOf(part) !== 0 && !clean.includes("le haut")) return part;
            return part.charAt(0).toUpperCase() + part.slice(1);
        }).join('');
    }

    async function fetchSchedules() {
        const debug = document.getElementById('debug');
        const url = `https://prim.iledefrance-mobilites.fr/marketplace/stop-monitoring?MonitoringRef=${MONITORING_REF}`;
        const proxy = `https://corsproxy.io/?${encodeURIComponent(url)}`;

        try {
            const response = await fetch(proxy, {
                method: 'GET',
                headers: { 'apiKey': API_KEY, 'Accept': 'application/json' }
            });
            if (!response.ok) throw new Error("Erreur " + response.status);
            const data = await response.json();
            const visits = data.Siri?.ServiceDelivery?.StopMonitoringDelivery?.[0]?.MonitoredStopVisit || [];
            render(visits);
            debug.innerText = `> Flux OK - ${new Date().toLocaleTimeString()}`;
        } catch (e) {
            debug.innerText = "> ÉCHEC : " + e.message;
        }
    }

    function render(visits) {
        const board = document.getElementById('board');
        const now = new Date();
        const seen = new Set();
        
        let trains = visits
            .map(v => v.MonitoredVehicleJourney)
            .filter(j => {
                const line = j.LineRef?.value || "";
                if (!line.includes('C01742') && line !== 'A') return false;
                const aimedTime = j.MonitoredCall.AimedDepartureTime;
                const destName = j.DestinationName[0].value;
                const uniqueKey = `${destName}_${aimedTime}`;
                if (seen.has(uniqueKey)) return false;
                seen.add(uniqueKey);
                const d = destName.toLowerCase();
                return !d.includes('boissy') && !d.includes('varenne');
            })
            .sort((a, b) => {
                const tA = new Date(a.MonitoredCall.ExpectedDepartureTime || a.MonitoredCall.AimedDepartureTime);
                const tB = new Date(b.MonitoredCall.ExpectedDepartureTime || b.MonitoredCall.AimedDepartureTime);
                return tA - tB;
            });

        if (trains.length === 0) {
            board.innerHTML = '<div style="text-align:center;margin-top:100px;color:#999;">Aucun train détecté.</div>';
            return;
        }

        let html = '';
        trains.slice(0, 7).forEach(j => {
            const dest = formatDestination(j.DestinationName[0].value);
            const mission = j.JourneyNote?.[0]?.value || "----";
            const time = new Date(j.MonitoredCall.ExpectedDepartureTime || j.MonitoredCall.AimedDepartureTime);
            const diff = Math.round((time - now) / 60000);
            
            const platformData = j.MonitoredCall.DeparturePlatformName;
            const platform = (platformData && typeof platformData === 'object') ? platformData.value : (platformData || "2");
            const isAtStop = j.MonitoredCall.VehicleAtStop === true || j.MonitoredCall.VehicleAtStop === "true";

            let timeHTML = '';
            if (isAtStop) {
                timeHTML = `<span class="full-text">À quai</span>`;
            } else if (diff <= 0) {
                timeHTML = `<span class="full-text">À l'approche</span>`;
            } else {
                timeHTML = `<span class="val">${diff}</span><span class="unit">min</span>`;
            }

            html += `
                <div class="row">
                    <div class="mission">${mission}</div>
                    <div class="dest">${dest}</div>
                    <div class="time">${timeHTML}</div>
                    <div class="platform">
                        <div class="platform-box">
                            <span class="platform-text">Quai</span>
                            <span class="platform-num">${platform}</span>
                        </div>
                    </div>
                </div>`;
        });
        board.innerHTML = html;
    }

    setInterval(updateClock, 1000);
    updateClock();
    fetchSchedules();
    // ACTUALISATION TOUTES LES 10 SECONDES
    setInterval(fetchSchedules, 10000);
</script>
</body>
</html>
