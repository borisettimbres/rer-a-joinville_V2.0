<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SIEL RER A - Joinville-le-Pont</title>
    <link href="https://fonts.googleapis.com/css2?family=Cabin:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --red-a: #CE283C; 
            --dark: #000000;
            --yellow: #fbc02d; 
            --bg-page: #f5f5f5;
            --grey-border: #666;
            --grey-bg: #eee;
            --info-bg: #d0dce4;
            --info-text: #1a3144;
            --ok-color: #00ff00;
            --ko-color: #ff4444;
            --loading-color: #F59E0B;
        }
        body { background: var(--bg-page); font-family: 'Cabin', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: white; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 8px solid var(--red-a); z-index: 10; }
        
        .header-left { display: flex; align-items: center; }
        .logos-container { display: flex; gap: 8px; align-items: center; }
        
        .logo-rer {
            background: white; border: 2.5px solid var(--dark); border-radius: 8px;
            width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            font-size: 16px; font-weight: bold; color: var(--dark); box-sizing: border-box;
        }
        
        .header-line-logo { width: 48px; height: 48px; }
        .station-info { margin-left: 15px; }
        .station-name { font-size: 26px; font-weight: bold; line-height: 1; letter-spacing: -0.5px; color: var(--dark); }
        .direction-info { font-size: 16px; color: var(--red-a); margin-top: 4px; font-weight: bold; letter-spacing: -0.2px; }
        
        .clock { background: var(--dark); color: var(--yellow); padding: 10px 22px; border-radius: 8px; font-size: 28px; font-weight: bold; }
        
        .board { flex-grow: 1; padding: 0 20px; overflow: hidden; display: flex; flex-direction: column; }
        
        .row { 
            display: grid; 
            grid-template-columns: 100px 1fr 220px 100px; 
            align-items: center; 
            padding: 15px 0; 
            border-bottom: 2px solid #ddd;
            background: var(--bg-page);
            transition: transform 0.6s ease-in, opacity 0.5s ease-in, height 0.6s ease, padding 0.6s ease;
            height: 70px;
            overflow: hidden;
        }
        .row.exit-left { transform: translateX(-120%); opacity: 0; height: 0; padding-top: 0; padding-bottom: 0; border-bottom: none; }

        .mission { background: #ddd; padding: 6px; border-radius: 4px; text-align: center; font-weight: bold; font-family: monospace; font-size: 16px; }
        .dest { font-size: 28px; font-weight: 700; padding-left: 15px; color: var(--dark); }
        .time { background: var(--dark); color: var(--yellow); border-radius: 8px; text-align: center; width: 190px; height: 60px; display: flex; justify-content: center; align-items: center; justify-self: center; overflow: hidden; }
        .time-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
        
        .blinking { animation: blinker 1.2s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

        .time .val, .time .full-text { font-size: 32px; font-weight: bold; line-height: 0.85; text-transform: uppercase; }
        .time .unit { font-size: 14px; margin-top: 2px; text-transform: lowercase; font-weight: bold; }

        .platform { display: flex; justify-content: center; border-left: 1px solid #ccc; padding-left: 10px; }
        .platform-box { background: var(--grey-bg); border: 2.5px solid var(--grey-border); border-radius: 8px; width: 60px; height: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-sizing: border-box; color: var(--dark); }
        .platform-num { font-size: 24px; font-weight: 900; }

        .info-trafic {
            background: var(--info-bg); height: 110px; display: flex; align-items: center; padding: 0 30px; border-top: 2px solid #b8c5ce; overflow: hidden;
        }
        .info-icon-container { margin-right: 35px; flex-shrink: 0; display: flex; align-items: center; }
        .icon-info-blue { width: 45px; height: 45px; background: white; border: 3px solid #1a3144; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; color: #1a3144; }

        .dynamic-wrapper { position: relative; display: none; align-items: center; justify-content: center; }
        .line-icon-main { width: 45px; height: 45px; flex-shrink: 0; }
        .line-icon-main svg, .header-line-logo svg { width: 100% !important; height: 100% !important; display: block; }

        .badge-dynamic { position: absolute; bottom: -6px; right: -8px; width: 24px; height: 24px; display: none; border: 3px solid var(--info-bg); border-radius: 8px; background-color: var(--info-bg); }

        .info-scroll-container { flex-grow: 1; height: 100%; display: flex; align-items: center; overflow: hidden; }
        .info-text { font-size: 24px; font-weight: 700; color: var(--info-text); width: 100%; transition: transform 0.5s, opacity 0.5s; }
        
        .time-box { background: #333; color: white; padding: 2px 6px; border-radius: 4px; font-family: monospace; margin: 0 4px; }

        footer { background: #333; color: #aaa; padding: 10px 20px; font-family: monospace; font-size: 11px; display: flex; justify-content: space-between; align-items: center; }
        .api-ok { color: var(--ok-color); font-weight: bold; }
        .api-ko { color: var(--ko-color); font-weight: bold; }
        .api-loading { color: var(--loading-color); font-weight: bold; }
        
        /* On cache le conteneur technique du sprite */
        #svg-sprite-storage { display: none; }
    </style>
</head>
<body>

<div id="svg-sprite-storage"></div>

<header>
    <div class="header-left">
        <div class="logos-container">
            <div class="logo-rer">RER</div>
            <div id="header-logo-a" class="header-line-logo"></div>
        </div>
        <div class="station-info">
            <div class="station-name">JOINVILLE-LE-PONT</div>
            <div class="direction-info">Paris · St-Germain-en-Laye · Poissy · Cergy</div>
        </div>
    </div>
    <div class="clock" id="clock">--:--</div>
</header>

<div class="board" id="board"></div>

<div class="info-trafic" id="info-trafic-bar">
    <div class="info-icon-container">
        <div id="icon-standard" class="icon-info-blue">i</div>
        <div id="dynamic-wrapper" class="dynamic-wrapper">
            <div id="icon-dynamic" class="line-icon-main"></div>
            <img id="badge-dynamic" class="badge-dynamic" src="" alt="status">
        </div>
    </div>
    <div class="info-scroll-container">
        <div class="info-text" id="traffic-message">Chargement des données...</div>
    </div>
</div>

<footer>
    <div id="debug-schedules">> SIEL : Initialisation...</div>
    <div style="display:flex; gap:20px;">
        <div id="debug-traffic"><span class="api-loading">Info Trafic : Attente...</span></div>
        <div id="debug-indices"><span class="api-loading">Indices : Attente...</span></div>
    </div>
</footer>

<script>
    const API_KEY_MAIN = '2pz4kMqzVx2zneQWOTnOrqM6muPE1XVO';
    const API_KEY_LOGOS = 'F2uOuFqwSrN1o5t1yAnV4XDDVUOh3Lso'; // Ton jeton à 10 requêtes/jour
    
    const MONITORING_REF = 'STIF:StopArea:SP:70640:'; 
    const DEFAULT_MSG = "Attentifs, ensemble • Ne pas se séparer de ses effets personnels • Signaler tout objet abandonné";

    const LINE_MAP = {
        'C01742': 'RER A', 'C01743': 'RER B', 'C01744': 'RER C', 'C01745': 'RER D', 'C01746': 'RER E',
        'C01371': 'M1', 'C01372': 'M2', 'C01373': 'M3', 'C01374': 'M4', 'C01375': 'M5', 'C01376': 'M6',
        'C01377': 'M7', 'C01378': 'M8', 'C01379': 'M9', 'C01380': 'M10', 'C01381': 'M11', 'C01382': 'M12',
        'C01383': 'M13', 'C01384': 'M14'
    };

    let displayQueue = [{text: DEFAULT_MSG, type: 'default', lineId: null}];
    let queueIndex = 0;
    const sleep = ms => new Promise(res => setTimeout(res, ms));
    const proxy = (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;

    // --- LOGIQUE DES INDICES (LOGOS) ---

    async function initLogos() {
        const debug = document.getElementById('debug-indices');
        const storage = document.getElementById('svg-sprite-storage');
        
        // 1. On regarde si on a déjà le sprite en local (0 requête consommée)
        const cachedSprite = localStorage.getItem('prim_logos_sprite_v1');
        
        if (cachedSprite) {
            storage.innerHTML = cachedSprite;
            debug.innerHTML = `<span class="api-ok">Indices : OK (Cache)</span>`;
            renderHeaderLogo();
            return;
        }

        // 2. Si rien en local, on fait l'unique appel API de la journée
        debug.innerHTML = `<span class="api-loading">Indices : API...</span>`;
        const lineIds = Object.keys(LINE_MAP).join(',');
        const url = `https://prim.iledefrance-mobilites.fr/marketplace/ilico/getIcon/sprite?lineIds=${lineIds}&format=sprite`;

        try {
            const response = await fetch(proxy(url), { headers: { 'apikey': API_KEY_LOGOS } });
            if (response.ok) {
                const svgContent = await response.text();
                localStorage.setItem('prim_logos_sprite_v1', svgContent);
                storage.innerHTML = svgContent;
                debug.innerHTML = `<span class="api-ok">Indices : OK (API)</span>`;
                renderHeaderLogo();
            } else {
                debug.innerHTML = `<span class="api-ko">Indices : ERREUR ${response.status}</span>`;
            }
        } catch (e) {
            debug.innerHTML = `<span class="api-ko">Indices : HS</span>`;
        }
    }

    function getLogoFromSprite(lineId) {
        // L'API Sprite crée des symboles avec des IDs correspondant aux IDs de lignes
        return `<svg viewBox="0 0 100 100"><use xlink:href="#${lineId}"></use></svg>`;
    }

    function renderHeaderLogo() {
        document.getElementById('header-logo-a').innerHTML = getLogoFromSprite('C01742');
    }

    // --- LOGIQUE TRAFIC ET SIEL ---

    async function fetchTraffic() {
        const debug = document.getElementById('debug-traffic');
        let newQueue = [{text: DEFAULT_MSG, type: 'default', lineId: null}];
        let success = 0;

        for (const id of Object.keys(LINE_MAP)) {
            const url = `https://prim.iledefrance-mobilites.fr/marketplace/general-message?LineRef=STIF:Line::${id}:`;
            try {
                const res = await fetch(proxy(url), { headers: { 'apikey': API_KEY_MAIN } });
                if (res.ok) {
                    success++;
                    const data = await res.json();
                    const messages = data.Siri?.ServiceDelivery?.GeneralMessageDelivery?.[0]?.InfoMessage || [];
                    messages.forEach(m => {
                        const text = m.Content?.Message[0]?.MessageText?.value;
                        if (text) {
                            const type = text.toLowerCase().includes('travaux') ? 'works' : 'incident';
                            newQueue.push({text, type, lineId: id});
                        }
                    });
                }
            } catch (e) {}
            await sleep(350); // Pause pour éviter le 429 sur la clé principale
        }
        
        if (success > 0) {
            displayQueue = newQueue;
            debug.innerHTML = `<span class="api-ok">Info Trafic : OK</span>`;
        } else {
            debug.innerHTML = `<span class="api-ko">Info Trafic : HS</span>`;
        }
    }

    function rotateMessage() {
        const txt = document.getElementById('traffic-message');
        const iconStd = document.getElementById('icon-standard');
        const wrapperDyn = document.getElementById('dynamic-wrapper');
        const iconDyn = document.getElementById('icon-dynamic');
        const badgeDyn = document.getElementById('badge-dynamic');

        if (queueIndex >= displayQueue.length) queueIndex = 0;
        const current = displayQueue[queueIndex];

        txt.style.opacity = 0;
        setTimeout(() => {
            iconStd.style.display = 'none';
            wrapperDyn.style.display = 'none';
            badgeDyn.style.display = 'none';

            if (current.type === 'default') {
                iconStd.style.display = 'flex';
            } else {
                wrapperDyn.style.display = 'flex';
                iconDyn.innerHTML = getLogoFromSprite(current.lineId);
                badgeDyn.style.display = 'block';
                badgeDyn.src = current.type === 'incident' 
                    ? "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='5' y='5' width='90' height='90' rx='20' fill='%23F2C94C'/><path d='M42 25 h16 l-2 35 h-12 z' fill='black'/><circle cx='50' cy='75' r='8' fill='black'/></svg>"
                    : "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='5' y='5' width='90' height='90' rx='20' fill='%23CA553C'/><path d='M30 70 L50 30 L70 70 Z' fill='white'/></svg>";
            }

            txt.innerHTML = current.text.replace(/(\d{1,2}h\d{2})/g, '<span class="time-box">$1</span>');
            txt.style.opacity = 1;
            queueIndex++;
        }, 500);
    }

    async function fetchSchedules() {
        const debug = document.getElementById('debug-schedules');
        try {
            const res = await fetch(proxy(`https://prim.iledefrance-mobilites.fr/marketplace/stop-monitoring?MonitoringRef=${MONITORING_REF}`), { headers: { 'apikey': API_KEY_MAIN } });
            const data = await res.json();
            const visits = data.Siri?.ServiceDelivery?.StopMonitoringDelivery?.[0]?.MonitoredStopVisit || [];
            
            let html = '';
            visits.slice(0, 6).forEach(v => {
                const j = v.MonitoredVehicleJourney;
                const time = new Date(j.MonitoredCall.ExpectedDepartureTime || j.MonitoredCall.AimedDepartureTime);
                const diff = Math.max(0, Math.round((time - new Date()) / 60000));
                html += `<div class="row">
                    <div class="mission">${j.JourneyNote?.[0]?.value || '---'}</div>
                    <div class="dest">${j.DestinationName[0].value.replace('GARE DE ', '')}</div>
                    <div class="time"><div class="time-wrapper"><span class="val">${diff}</span><span class="unit">min</span></div></div>
                    <div class="platform"><div class="platform-box"><span class="platform-num">${j.MonitoredCall.DeparturePlatformName?.value || '-'}</span></div></div>
                </div>`;
            });
            document.getElementById('board').innerHTML = html || '<div style="text-align:center; padding:50px;">Aucun train</div>';
            debug.innerHTML = `> SIEL OK - ${new Date().toLocaleTimeString()}`;
        } catch (e) { debug.innerHTML = `<span class="api-ko">> SIEL HS</span>`; }
    }

    // --- EXECUTION ---
    
    initLogos(); // Utilise la clé dédiée et le cache local
    
    fetchSchedules();
    setInterval(fetchSchedules, 30000);

    fetchTraffic();
    setInterval(fetchTraffic, 600000); // Update trafic toutes les 10 min
    
    setInterval(rotateMessage, 5000);
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
    }, 1000);
</script>
</body>
</html>
