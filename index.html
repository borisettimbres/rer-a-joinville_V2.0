<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SIEL RER A - Joinville-le-Pont</title>
    <link href="https://fonts.googleapis.com/css2?family=Cabin:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --red-a: #CE283C; 
            --dark: #000000;
            --yellow: #fbc02d; 
            --bg-page: #f5f5f5;
            --grey-border: #666;
            --grey-bg: #eee;
            --info-bg: #d0dce4;
            --info-text: #1a3144;
            --ok-color: #00ff00;
            --ko-color: #ff4444;
            --loading-color: #F59E0B;
        }
        body { background: var(--bg-page); font-family: 'Cabin', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: white; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 8px solid var(--red-a); z-index: 10; }
        
        .header-left { display: flex; align-items: center; }
        .logos-container { display: flex; gap: 8px; align-items: center; }
        
        .logo-rer {
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-sizing: border-box;
}

.logo-rer img {
    width: 100%;
    height: 100%;
    object-fit: contain; /* Garantit que le logo ne soit pas déformé */
}
        
        .header-line-logo { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; }
        .header-line-logo img { width: 100%; height: 100%; object-fit: contain; }
        
        .station-info { margin-left: 15px; }
        .station-name { font-size: 26px; font-weight: bold; line-height: 1; letter-spacing: -0.5px; color: var(--dark); }
        .direction-info { font-size: 16px; color: var(--red-a); margin-top: 4px; font-weight: bold; letter-spacing: -0.2px; }
        
        .clock { background: var(--dark); color: var(--yellow); padding: 10px 22px; border-radius: 8px; font-size: 28px; font-weight: bold; }
        
        .board { flex-grow: 1; padding: 0 20px; overflow: hidden; display: flex; flex-direction: column; }
        
        .row { 
            display: grid; 
            grid-template-columns: 100px 1fr 220px 100px; 
            align-items: center; 
            padding: 15px 0; 
            border-bottom: 2px solid #ddd;
            background: var(--bg-page);
            transition: transform 0.6s ease-in, opacity 0.5s ease-in, height 0.6s ease, padding 0.6s ease;
            height: 70px;
            overflow: hidden;
        }
        .row.exit-left { transform: translateX(-120%); opacity: 0; height: 0; padding-top: 0; padding-bottom: 0; border-bottom: none; }
        
        .mission { background: #ddd; padding: 6px; border-radius: 4px; text-align: center; font-weight: bold; font-family: monospace; font-size: 16px; }
        .dest { font-size: 28px; font-weight: 700; padding-left: 15px; color: var(--dark); }
        
        .time { background: var(--dark); color: var(--yellow); border-radius: 8px; text-align: center; width: 190px; height: 60px; display: flex; justify-content: center; align-items: center; justify-self: center; overflow: hidden; }
        .time-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
        
        .blinking { animation: blinker 1.2s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

        .time .val, .time .full-text { font-size: 32px; font-weight: bold; line-height: 0.85; text-transform: uppercase; }
        .time .unit { font-size: 14px; margin-top: 2px; text-transform: lowercase; font-weight: bold; }

        .platform { display: flex; justify-content: center; border-left: 1px solid #ccc; padding-left: 10px; }
        .platform-box { background: var(--grey-bg); border: 2.5px solid var(--grey-border); border-radius: 8px; width: 60px; height: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-sizing: border-box; color: var(--dark); }
        .platform-num { font-size: 24px; font-weight: 900; }

        .info-trafic {
            background: var(--info-bg); height: 110px; display: flex; align-items: center; padding: 0 30px; border-top: 2px solid #b8c5ce; overflow: hidden;
        }

        .info-icon-container { margin-right: 35px; flex-shrink: 0; display: flex; align-items: center; }
        .icon-info-blue { width: 45px; height: 45px; background: white; border: 3px solid #1a3144; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; color: #1a3144; }

        .dynamic-wrapper { position: relative; display: none; align-items: center; justify-content: center; }
        .line-icon-main { display: flex; align-items: center; justify-content: center; width: 45px; height: 45px; flex-shrink: 0; }
        .line-icon-main img { width: 100%; height: 100%; object-fit: contain; }

        .badge-dynamic {
            position: absolute; bottom: -6px; right: -8px; width: 24px; height: 24px; display: none;
            border: 3px solid var(--info-bg); border-radius: 8px; background-color: var(--info-bg); 
            object-fit: contain; box-sizing: content-box; 
        }

        .info-scroll-container { flex-grow: 1; height: 100%; display: flex; align-items: center; overflow: hidden; position: relative; }
        .info-text { font-size: 24px; font-weight: 700; color: var(--info-text); width: 100%; display: block; line-height: 1.35; transition: transform 0.5s, opacity 0.5s; }
        
        .slide-up-exit { transform: translateY(-100%); opacity: 0; }
        .slide-up-enter { transform: translateY(100%); opacity: 0; }
        
        .time-box { background: #333; color: white; padding: 2px 6px; border-radius: 4px; font-family: monospace; display: inline-block; margin: 0 4px; }

        footer { background: #333; color: #aaa; padding: 10px 20px; font-family: monospace; font-size: 11px; z-index: 10; display: flex; justify-content: space-between; align-items: center; }
        .api-ok { color: var(--ok-color); font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <div class="logos-container">
            <div class="logo-rer">RER</div>
            <div id="header-logo-a" class="header-line-logo">
                <img src="logos/C01742.svg" alt="A" onerror="this.style.display='none'">
            </div>
        </div>
        <div class="station-info">
            <div class="station-name">JOINVILLE-LE-PONT</div>
            <div class="direction-info">Paris · St-Germain-en-Laye · Poissy · Cergy</div>
        </div>
    </div>
    <div class="clock" id="clock">--:--</div>
</header>

<div class="board" id="board"></div>

<div class="info-trafic" id="info-trafic-bar">
    <div class="info-icon-container">
        <div id="icon-standard" class="icon-info-blue">i</div>
        <div id="dynamic-wrapper" class="dynamic-wrapper">
            <div id="icon-dynamic" class="line-icon-main"></div>
            <img id="badge-dynamic" class="badge-dynamic" src="" alt="status">
        </div>
    </div>
    <div class="info-scroll-container">
        <div class="info-text" id="traffic-message">Connexion au réseau PRIM...</div>
    </div>
</div>

<footer>
    <div id="debug-schedules">> SIEL : Initialisation...</div>
    <div class="footer-apis">
        <div id="debug-traffic">API Info Trafic : --</div>
        <div id="debug-indices"><span class="api-ok">Logos : Stockage Local OK</span></div>
    </div>
</footer>

<script>
    const API_KEY = '2pz4kMqzVx2zneQWOTnOrqM6muPE1XVO';
    const MONITORING_REF = 'STIF:StopArea:SP:70640:'; 
    const DEFAULT_MSG = "Attentifs, ensemble • Ne pas se séparer de ses effets personnels • Signaler tout objet abandonné ou situation inhabituelle";

    // Liste des lignes pour lesquelles on veut le trafic
    const TRAFFIC_LINES = {
        'C01742': 'RER A', 'C01743': 'RER B', 'C01744': 'RER C', 'C01745': 'RER D', 'C01746': 'RER E',
        'C01371': 'M1', 'C01372': 'M2', 'C01373': 'M3', 'C01374': 'M4', 'C01375': 'M5', 'C01376': 'M6',
        'C01377': 'M7', 'C01378': 'M8', 'C01379': 'M9', 'C01380': 'M10', 'C01381': 'M11', 'C01382': 'M12',
        'C01383': 'M13', 'C01384': 'M14'
    };

    let currentTrainsData = [];
    let isAnimating = false;
    let displayQueue = [{text: DEFAULT_MSG, type: 'default', line: null, lineId: null}];
    let queueIndex = 0;
    const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

    function updateClock() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'});
    }

    async function fetchGlobalTraffic() {
        const debugNode = document.getElementById('debug-traffic');
        const lineIds = Object.keys(TRAFFIC_LINES);
        let newQueue = [{text: DEFAULT_MSG, type: 'default', line: null, lineId: null}];
        let successCount = 0;

        for (const id of lineIds) {
            const url = `https://prim.iledefrance-mobilites.fr/marketplace/general-message?LineRef=STIF:Line::${id}:`;
            const proxy = `https://corsproxy.io/?${encodeURIComponent(url)}`;
            try {
                const response = await fetch(proxy, { headers: { 'apikey': API_KEY, 'Accept': 'application/json' } });
                if (response.ok) {
                    successCount++;
                    const data = await response.json();
                    const messages = data.Siri?.ServiceDelivery?.GeneralMessageDelivery?.[0]?.InfoMessage || [];
                    messages.forEach(m => {
                        const channel = m.InfoChannelRef?.value; 
                        const msgs = m.Content?.Message || [];
                        const short = msgs.find(msg => msg.MessageType === "SHORT_MESSAGE");
                        let text = short ? short.MessageText.value : (msgs[0]?.MessageText?.value || "");
                        
                        if (text) {
                            const lowerText = text.toLowerCase();
                            const isRER = TRAFFIC_LINES[id].startsWith('RER');
                            
                            // On affiche si c'est un RER (plus laxiste) OU si c'est un métro avec alerte
                            if (isRER || channel === "Perturbation" || channel === "PlannedWork" || lowerText.includes("travaux") || lowerText.includes("tvx")) {
                                
                                let type = 'incident'; // Par défaut (!) clignotant
                                
                                if (lowerText.includes("travaux") || lowerText.includes("tvx") || channel === "PlannedWork") {
                                    type = 'works'; // Plot orange statique
                                } else if (lowerText.includes("interrompu") || lowerText.includes("interruption") || lowerText.includes("suspendu") || lowerText.includes("arrêt")) {
                                    type = 'interruption'; // Croix rouge clignotante
                                }
                                
                                newQueue.push({text: text, type: type, line: TRAFFIC_LINES[id], lineId: id});
                            }
                        }
                    });
                }
            } catch (e) { console.error(e); }
            await sleep(300); 
        }

        if (successCount > 0) {
            displayQueue = Array.from(new Set(newQueue.map(a => JSON.stringify(a)))).map(a => JSON.parse(a));
            debugNode.innerHTML = `<span class="api-ok">Trafic : OK (${displayQueue.length-1} alertes)</span>`;
        } else {
            debugNode.innerHTML = `<span class="api-ko">Trafic : ERREUR</span>`;
        }
    }

    function rotateMessage() {
        const txtNode = document.getElementById('traffic-message');
        const iconStd = document.getElementById('icon-standard');
        const wrapperDyn = document.getElementById('dynamic-wrapper');
        const iconDyn = document.getElementById('icon-dynamic');
        const badgeDyn = document.getElementById('badge-dynamic');

        txtNode.classList.add('slide-up-exit');

        setTimeout(() => {
            if (queueIndex >= displayQueue.length) queueIndex = 0;
            const current = displayQueue[queueIndex];

            iconStd.style.display = 'none';
            wrapperDyn.style.display = 'none';
            badgeDyn.style.display = 'none';
            badgeDyn.classList.remove('blinking');

            if (current.type === 'default') {
                iconStd.style.display = 'flex';
            } else if (current.lineId) { 
                wrapperDyn.style.display = 'flex';
                iconDyn.innerHTML = `<img src="logos/${current.lineId}.svg" 
                                          onerror="this.parentElement.innerHTML='${current.line.replace('RER ','').replace('M','')}'" 
                                          alt="${current.line}">`;
                
                badgeDyn.style.display = 'block';

                if (current.type === 'works') {
                    // Badge Plot de travaux (Statique)
                    badgeDyn.src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='5' y='5' width='90' height='90' rx='20' fill='%23CA553C' stroke='%231A1A1A' stroke-width='10'/><path d='M44 34 L56 34 L53 22 C52 18 48 18 47 22 Z' fill='white'/><polygon points='39,55 61,55 57,40 43,40' fill='white'/><path d='M34 61 L66 61 L68 68 C76 68 76 80 66 80 L34 80 C24 80 24 68 32 68 Z' fill='white'/></svg>";
                } 
                else if (current.type === 'interruption') {
                    // Badge Croix Blanche sur fond Rouge (Clignotant)
                    badgeDyn.src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='5' y='5' width='90' height='90' rx='20' fill='%23ff4444' stroke='%231A1A1A' stroke-width='10'/><path d='M30 30 L70 70 M70 30 L30 70' stroke='white' stroke-width='12' stroke-linecap='round'/></svg>";
                    badgeDyn.classList.add('blinking');
                }
                else {
                    // Badge Perturbation Jaune "!" (Clignotant)
                    badgeDyn.src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='5' y='5' width='90' height='90' rx='20' fill='%23F2C94C' stroke='%231A1A1A' stroke-width='10'/><path d='M42 25 h16 l-2 35 h-12 z' fill='%231A1A1A'/><circle cx='50' cy='75' r='8' fill='%231A1A1A'/></svg>";
                    badgeDyn.classList.add('blinking');
                }
            }

            txtNode.innerHTML = current.text.replace(/(\d{1,2}h\d{2}|\d{1,2}:\d{2})/g, '<span class="time-box">$1</span>');
            txtNode.classList.remove('slide-up-exit');
            txtNode.classList.add('slide-up-enter');
            setTimeout(() => txtNode.classList.remove('slide-up-enter'), 50);
            queueIndex = (queueIndex + 1) % displayQueue.length;
        }, 500);
    }

    async function fetchSchedules() {
        if (isAnimating) return;
        const debug = document.getElementById('debug-schedules');
        const url = `https://prim.iledefrance-mobilites.fr/marketplace/stop-monitoring?MonitoringRef=${MONITORING_REF}`;
        const proxy = `https://corsproxy.io/?${encodeURIComponent(url)}`;
        try {
            const response = await fetch(proxy, { headers: { 'apikey': API_KEY, 'Accept': 'application/json' } });
            const data = await response.json();
            const visits = data.Siri?.ServiceDelivery?.StopMonitoringDelivery?.[0]?.MonitoredStopVisit || [];
            processUpdate(visits);
            debug.innerHTML = `> SIEL OK - ${new Date().toLocaleTimeString()}`;
        } catch (e) { debug.innerHTML = `<span class="api-ko">> SIEL HS</span>`; }
    }

    function processUpdate(visits) {
        const seen = new Set();
        let newTrains = visits.map(v => v.MonitoredVehicleJourney).filter(j => {
            const line = j.LineRef?.value || "";
            if (!line.includes('C01742') && line !== 'A') return false;
            const uniqueKey = `${j.DestinationName[0].value}_${j.MonitoredCall.AimedDepartureTime}`;
            if (seen.has(uniqueKey)) return false;
            seen.add(uniqueKey);
            return !j.DestinationName[0].value.toLowerCase().includes('boissy') && !j.DestinationName[0].value.toLowerCase().includes('varenne');
        }).sort((a, b) => new Date(a.MonitoredCall.ExpectedDepartureTime || a.MonitoredCall.AimedDepartureTime) - new Date(b.MonitoredCall.ExpectedDepartureTime || b.MonitoredCall.AimedDepartureTime)).slice(0, 7);
        
        if (currentTrainsData.length > 0 && newTrains.length > 0) {
            if (currentTrainsData[0].FramedVehicleJourneyRef?.DatedVehicleJourneyRef !== newTrains[0].FramedVehicleJourneyRef?.DatedVehicleJourneyRef) {
                const firstRow = document.querySelector('.row');
                if (firstRow) {
                    isAnimating = true;
                    firstRow.classList.add('exit-left');
                    setTimeout(() => { render(newTrains); isAnimating = false; }, 600);
                    return;
                }
            }
        }
        render(newTrains);
    }

    function render(trains) {
        const board = document.getElementById('board');
        const now = new Date();
        let html = '';
        if (trains.length === 0) { board.innerHTML = '<div style="text-align:center;margin-top:100px;color:#999;">Aucun train.</div>'; return; }
        trains.forEach(j => {
            const dest = j.DestinationName[0].value.replace(/GARE DE /gi, '').trim();
            const diff = Math.round((new Date(j.MonitoredCall.ExpectedDepartureTime || j.MonitoredCall.AimedDepartureTime) - now) / 60000);
            const isAtStop = j.MonitoredCall.VehicleAtStop === true || j.MonitoredCall.VehicleAtStop === "true";
            let timeHTML = (isAtStop) ? '<span class="full-text">À quai</span>' : (diff <= 0 ? '<span class="full-text">À l\'approche</span>' : `<span class="val">${diff}</span><span class="unit">min</span>`);
            const platform = j.MonitoredCall.DeparturePlatformName?.value || "";
            html += `<div class="row">
                        <div class="mission">${j.JourneyNote?.[0]?.value || '----'}</div>
                        <div class="dest">${dest}</div>
                        <div class="time"><div class="time-wrapper ${diff <= 0 && !isAtStop ? 'blinking' : ''}">${timeHTML}</div></div>
                        <div class="platform">${platform ? `<div class="platform-box"><span class="platform-num">${platform}</span></div>` : ''}</div>
                     </div>`;
        });
        board.innerHTML = html;
        currentTrainsData = trains;
    }

    updateClock();
    setInterval(updateClock, 1000);
    fetchSchedules();
    setInterval(fetchSchedules, 20000);
    fetchGlobalTraffic();
    setInterval(fetchGlobalTraffic, 300000); 
    setInterval(rotateMessage, 5000);
</script>
</body>
</html>
