<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SIEL RER A - Joinville-le-Pont</title>
    <link href="https://fonts.googleapis.com/css2?family=Cabin:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --red-a: #c0333a; 
            --dark: #000000;
            --yellow: #fbc02d; 
            --bg-page: #f5f5f5;
            --grey-border: #666;
            --grey-bg: #eee;
            --info-blue-bg: #d0dae5; /* Bleu-gris de l'encart sur la photo */
            --info-text-color: #1a1a1a;
        }
        body { background: var(--bg-page); font-family: 'Cabin', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: white; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 8px solid var(--red-a); z-index: 10; }
        .header-left { display: flex; align-items: center; }
        .logos-container { display: flex; gap: 8px; align-items: center; }
        .logo-rer { background: white; border: 2.5px solid var(--dark); border-radius: 8px; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 900; color: var(--dark); box-sizing: border-box; }
        .logo-a { background: var(--red-a); border-radius: 8px; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: 900; color: white; box-sizing: border-box; }
        .station-info { margin-left: 15px; }
        .station-name { font-size: 26px; font-weight: bold; line-height: 1; letter-spacing: -0.5px; color: var(--dark); }
        .direction-info { font-size: 16px; color: var(--red-a); margin-top: 4px; font-weight: bold; letter-spacing: -0.2px; }
        .clock { background: var(--dark); color: var(--yellow); padding: 10px 22px; border-radius: 8px; font-size: 28px; font-weight: bold; }
        
        .board { flex-grow: 1; padding: 0 20px; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Style des lignes avec le dégradé léger de la photo */
        .row { 
            display: grid; 
            grid-template-columns: 100px 1fr 220px 100px; 
            align-items: center; 
            padding: 15px 0; 
            border-bottom: 2px solid #ccc;
            background: linear-gradient(to bottom, #f9f9f9, #ececec);
            transition: transform 0.6s ease-in, opacity 0.5s ease-in, height 0.6s ease, padding 0.6s ease;
            height: 75px;
            overflow: hidden;
        }

        .row.exit-left { transform: translateX(-120%); opacity: 0; height: 0; padding-top: 0; padding-bottom: 0; border-bottom: none; }
        @keyframes slideInFromBottom { 0% { transform: translateY(50px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        .row.new-row { animation: slideInFromBottom 0.5s ease-out forwards; }

        .mission { background: #6b7c93; color: white; padding: 4px; border-radius: 3px; text-align: center; font-weight: bold; font-family: monospace; font-size: 14px; width: 65px; justify-self: center; }
        .dest { font-size: 32px; font-weight: 700; padding-left: 15px; color: #2c3e50; }
        
        .time { background: var(--dark); color: var(--yellow); border-radius: 6px; text-align: center; width: 140px; height: 65px; display: flex; justify-content: center; align-items: center; justify-self: center; }
        .time-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .blinking { animation: blinker 1.2s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

        .time .val { font-size: 42px; font-weight: bold; line-height: 0.8; }
        .time .unit { font-size: 14px; font-weight: bold; margin-top: 2px; }
        .time .full-text { font-size: 24px; font-weight: bold; text-transform: uppercase; }

        .platform { display: flex; justify-content: center; }
        .platform-box { background: #f0f0f0; border: 2px solid #999; border-radius: 8px; width: 65px; height: 65px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--dark); }
        .platform-num { font-size: 32px; font-weight: 900; }

        /* --- ENCART INFOS / PERTURBATIONS (Style IMG_2948) --- */
        .info-bar {
            background: var(--info-blue-bg);
            min-height: 110px;
            display: flex;
            align-items: center;
            padding: 10px 20px;
            position: relative;
            z-index: 5;
            border-top: 2px solid #adb5bd;
        }

        .info-left-icons {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .mini-logo { width: 22px; height: 22px; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; }
        .mini-rer { background: white; border: 1px solid black; color: black; }
        .mini-a { background: var(--red-a); color: white; }

        .info-icon-box {
            background: none;
            border: 3px solid #1a1a1a;
            border-radius: 8px;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 20px;
            flex-shrink: 0;
        }
        .info-icon-box span { font-size: 32px; font-weight: 900; color: #1a1a1a; }

        .info-content {
            flex-grow: 1;
            font-size: 22px;
            font-weight: 700;
            color: var(--info-text-color);
            line-height: 1.2;
        }

        /* Animation si le texte est trop long */
        .marquee-container { overflow: hidden; white-space: normal; }
        .is-marquee { white-space: nowrap; animation: marquee 20s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        footer { background: #333; color: #0f0; padding: 5px 20px; font-family: monospace; font-size: 11px; z-index: 10; }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <div class="logos-container">
            <div class="logo-rer">RER</div>
            <div class="logo-a">A</div>
        </div>
        <div class="station-info">
            <div class="station-name">JOINVILLE-LE-PONT</div>
            <div class="direction-info">Paris · St-Germain-en-Laye · Poissy · Cergy</div>
        </div>
    </div>
    <div class="clock" id="clock">--:--</div>
</header>

<div class="board" id="board"></div>

<div class="info-bar" id="info-bar">
    <div class="info-left-icons">
        <div class="mini-logo mini-rer">RER</div>
        <div class="mini-logo mini-a">A</div>
    </div>
    <div class="info-icon-box" id="info-icon">
        <span>i</span>
    </div>
    <div class="info-content">
        <div id="info-text">
            Attentifs, ensemble • Ne pas se séparer de ses effets personnels • Signaler à nos agents tout objet abandonné, comportement ou situation inhabituels
        </div>
    </div>
</div>

<footer id="debug">Prêt.</footer>

<script>
    const API_KEY = '2pz4kMqzVx2zneQWOTnOrqM6muPE1XVO';
    const MONITORING_REF = 'STIF:StopArea:SP:70640:'; 
    const LINE_REF = 'STIF:Line::C01742:'; 
    const DEFAULT_MSG = "Attentifs, ensemble • Ne pas se séparer de ses effets personnels • Signaler à nos agents tout objet abandonné, comportement ou situation inhabituels";
    
    let lastTimes = {};
    let currentTrainsData = [];
    let isAnimating = false;

    function updateClock() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'});
    }

    function formatDestination(text) {
        let clean = text.replace(/GARE DE /gi, '').trim().toLowerCase();
        if (clean === "cergy le haut") return "Cergy - Le Haut";
        return clean.split(/([ -])/).map(part => {
            if (part === " " || part === "-") return part;
            const exceptions = ["de", "la", "le"];
            if (exceptions.includes(part) && clean.indexOf(part) !== 0 && !clean.includes("le haut")) return part;
            return part.charAt(0).toUpperCase() + part.slice(1);
        }).join('');
    }

    async function fetchTrafficInfo() {
        const url = `https://prim.iledefrance-mobilites.fr/marketplace/service-status?LineRef=${LINE_REF}`;
        const proxy = `https://corsproxy.io/?${encodeURIComponent(url)}`;
        
        try {
            const response = await fetch(proxy, { headers: { 'apiKey': API_KEY } });
            const data = await response.json();
            const situations = data.Siri?.ServiceDelivery?.SituationExchangeDelivery?.[0]?.Situations?.PtSituationElement || [];
            
            // Filtrer les perturbations réelles (pas de simple "Trafic normal")
            const alerts = situations.filter(s => s.Severity !== "noHazard" && s.Severity !== "unknown");

            const iconBox = document.getElementById('info-icon');
            const txtElement = document.getElementById('info-text');

            if (alerts.length > 0) {
                // Mode ALERTE
                const messages = alerts.map(s => s.Summary[0]?.value).join(' • ');
                txtElement.innerHTML = messages;
                txtElement.classList.add('is-marquee');
                iconBox.innerHTML = '<span>×</span>';
                iconBox.style.borderColor = '#c0333a';
                iconBox.querySelector('span').style.color = '#c0333a';
            } else {
                // Mode INFO (Défaut)
                txtElement.innerHTML = DEFAULT_MSG;
                txtElement.classList.remove('is-marquee');
                iconBox.innerHTML = '<span>i</span>';
                iconBox.style.borderColor = '#1a1a1a';
                iconBox.querySelector('span').style.color = '#1a1a1a';
            }
        } catch (e) {
            console.error("Traffic error", e);
        }
    }

    async function fetchSchedules() {
        if (isAnimating) return;
        const debug = document.getElementById('debug');
        const url = `https://prim.iledefrance-mobilites.fr/marketplace/stop-monitoring?MonitoringRef=${MONITORING_REF}`;
        const proxy = `https://corsproxy.io/?${encodeURIComponent(url)}`;

        try {
            const response = await fetch(proxy, { headers: { 'apiKey': API_KEY } });
            const data = await response.json();
            const visits = data.Siri?.ServiceDelivery?.StopMonitoringDelivery?.[0]?.MonitoredStopVisit || [];
            processUpdate(visits);
            debug.innerText = `> Flux OK - ${new Date().toLocaleTimeString()}`;
        } catch (e) {
            debug.innerText = "> ÉCHEC : " + e.message;
        }
    }

    function processUpdate(visits) {
        const now = new Date();
        const seen = new Set();
        
        let newTrains = visits
            .map(v => v.MonitoredVehicleJourney)
            .filter(j => {
                const line = j.LineRef?.value || "";
                if (!line.includes('C01742') && line !== 'A') return false;
                const aimedTime = j.MonitoredCall.AimedDepartureTime;
                const uniqueKey = `${j.DestinationName[0].value}_${aimedTime}`;
                if (seen.has(uniqueKey)) return false;
                seen.add(uniqueKey);
                return !j.DestinationName[0].value.toLowerCase().includes('boissy') && !j.DestinationName[0].value.toLowerCase().includes('varenne');
            })
            .sort((a, b) => new Date(a.MonitoredCall.ExpectedDepartureTime || a.MonitoredCall.AimedDepartureTime) - new Date(b.MonitoredCall.ExpectedDepartureTime || b.MonitoredCall.AimedDepartureTime))
            .slice(0, 5); // Limité à 5 comme sur la photo

        if (currentTrainsData.length > 0 && newTrains.length > 0) {
            if (currentTrainsData[0].FramedVehicleJourneyRef?.DatedVehicleJourneyRef !== newTrains[0].FramedVehicleJourneyRef?.DatedVehicleJourneyRef) {
                triggerDepartureAnimation(newTrains);
                return;
            }
        }
        render(newTrains);
    }

    function triggerDepartureAnimation(newTrains) {
        const firstRow = document.querySelector('.row');
        if (firstRow) {
            isAnimating = true;
            firstRow.classList.add('exit-left');
            setTimeout(() => {
                render(newTrains);
                isAnimating = false;
            }, 600);
        } else {
            render(newTrains);
        }
    }

    function render(trains) {
        const board = document.getElementById('board');
        const now = new Date();
        let html = '';

        if (trains.length === 0) {
            board.innerHTML = '<div style="text-align:center;margin-top:100px;color:#999;">Aucun train détecté.</div>';
            currentTrainsData = [];
            return;
        }

        trains.forEach(j => {
            const dest = formatDestination(j.DestinationName[0].value);
            const mission = j.JourneyNote?.[0]?.value || "----";
            const time = new Date(j.MonitoredCall.ExpectedDepartureTime || j.MonitoredCall.AimedDepartureTime);
            const diff = Math.round((time - now) / 60000);
            const isAtStop = j.MonitoredCall.VehicleAtStop === true || j.MonitoredCall.VehicleAtStop === "true";
            
            let timeHTML = (isAtStop) ? '<span class="full-text">À quai</span>' : (diff <= 0 ? '<span class="full-text">À l\'approche</span>' : `<span class="val">${diff}</span><span class="unit">min</span>`);
            let statusClass = (diff <= 0 && !isAtStop) ? 'blinking' : '';
            const isNewRow = !currentTrainsData.some(old => old.FramedVehicleJourneyRef?.DatedVehicleJourneyRef === j.FramedVehicleJourneyRef?.DatedVehicleJourneyRef);

            html += `
                <div class="row ${isNewRow ? 'new-row' : ''}">
                    <div class="mission">${mission}</div>
                    <div class="dest">${dest}</div>
                    <div class="time"><div class="time-wrapper ${statusClass}">${timeHTML}</div></div>
                    <div class="platform"><div class="platform-box"><span class="platform-num">${j.MonitoredCall.DeparturePlatformName?.value || "2"}</span></div></div>
                </div>`;
        });

        board.innerHTML = html;
        currentTrainsData = trains;
    }

    setInterval(updateClock, 1000);
    updateClock();
    fetchSchedules();
    setInterval(fetchSchedules, 10000);
    fetchTrafficInfo();
    setInterval(fetchTrafficInfo, 60000);
</script>
</body>
</html>
