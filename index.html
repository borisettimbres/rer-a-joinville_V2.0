<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SIEL RER A - Joinville-le-Pont</title>
    <link href="https://fonts.googleapis.com/css2?family=Cabin:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --red-a: #c0333a; 
            --dark: #000000;
            --yellow: #fbc02d; 
            --bg-page: #f5f5f5;
            --grey-border: #666;
            --grey-bg: #eee;
        }
        body { background: var(--bg-page); font-family: 'Cabin', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: white; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 8px solid var(--red-a); z-index: 10; }
        
        .header-left { display: flex; align-items: center; }
        .logos-container { display: flex; gap: 8px; align-items: center; }
        
        .logo-rer {
            background: white; border: 2.5px solid var(--dark); border-radius: 8px;
            width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 900; color: var(--dark); box-sizing: border-box;
        }
        
        .logo-a {
            background: var(--red-a); border-radius: 8px;
            width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
            font-size: 36px; font-weight: 900; color: white; box-sizing: border-box;
        }
        
        .station-info { margin-left: 15px; }
        .station-name { font-size: 26px; font-weight: bold; line-height: 1; letter-spacing: -0.5px; color: var(--dark); }
        .direction-info { font-size: 16px; color: var(--red-a); margin-top: 4px; font-weight: bold; letter-spacing: -0.2px; }
        
        .clock { background: var(--dark); color: var(--yellow); padding: 10px 22px; border-radius: 8px; font-size: 28px; font-weight: bold; }
        
        .board { flex-grow: 1; padding: 0 20px; display: flex; flex-direction: column; overflow: hidden; }
        
        .row { 
            display: grid; 
            grid-template-columns: 100px 1fr 220px 100px; 
            align-items: center; 
            padding: 15px 0; 
            border-bottom: 2px solid #ddd; 
            background: var(--bg-page);
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* --- NOUVELLES ANIMATIONS --- */
        
        /* Apparition (remontée du bas) */
        @keyframes slideUpRow {
            0% { transform: translateY(100vh); }
            100% { transform: translateY(0); }
        }

        .row-animate-in {
            animation: slideUpRow 0.8s cubic-bezier(0.23, 1, 0.32, 1) both;
        }

        /* Disparition (glissement vers la gauche) */
        @keyframes slideOutLeft {
            0% { transform: translateX(0); opacity: 1; }
            100% { transform: translateX(-100%); opacity: 0; }
        }

        .row-exit {
            animation: slideOutLeft 0.6s ease-in forwards !important;
        }

        /* Délais successifs pour l'effet de cascade lors du premier chargement */
        .row:nth-child(1) { animation-delay: 0.05s; }
        .row:nth-child(2) { animation-delay: 0.1s; }
        .row:nth-child(3) { animation-delay: 0.15s; }
        .row:nth-child(4) { animation-delay: 0.2s; }
        .row:nth-child(5) { animation-delay: 0.25s; }

        /* --- ANIMATIONS EXISTANTES PRÉSERVÉES --- */
        @keyframes slideIn { 0% { transform: translateY(10px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        @keyframes blinker { 50% { opacity: 0; } }

        .time { background: var(--dark); color: var(--yellow); border-radius: 8px; text-align: center; width: 190px; height: 70px; display: flex; justify-content: center; align-items: center; justify-self: center; overflow: hidden; }
        .time-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
        .animate-text { animation: slideIn 0.5s ease-out; }
        .blinking { animation: blinker 1.2s linear infinite; }
        .time .val, .time .full-text { font-size: 32px; font-weight: bold; line-height: 0.85; text-transform: uppercase; display: block; }
        .time .unit { font-size: 14px; margin-top: 2px; text-transform: lowercase; font-weight: bold; display: block; }

        .platform { display: flex; justify-content: center; border-left: 1px solid #ccc; padding-left: 10px; }
        .platform-box { background: var(--grey-bg); border: 2.5px solid var(--grey-border); border-radius: 8px; width: 70px; height: 70px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-sizing: border-box; color: var(--dark); line-height: 1; }
        .platform-text { font-size: 11px; text-transform: uppercase; font-weight: bold; margin-bottom: 2px; }
        .platform-num { font-size: 28px; font-weight: 900; }

        footer { background: #333; color: #0f0; padding: 10px 20px; font-family: monospace; font-size: 11px; z-index: 10; }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <div class="logos-container">
            <div class="logo-rer">RER</div>
            <div class="logo-a">A</div>
        </div>
        <div class="station-info">
            <div class="station-name">JOINVILLE-LE-PONT</div>
            <div class="direction-info">Paris · St-Germain-en-Laye · Poissy · Cergy</div>
        </div>
    </div>
    <div class="clock" id="clock">--:--</div>
</header>

<div class="board" id="board">
    <div style="text-align:center; margin-top:100px; color:#999;">Initialisation...</div>
</div>

<footer id="debug">Prêt.</footer>

<script>
    const API_KEY = '2pz4kMqzVx2zneQWOTnOrqM6muPE1XVO';
    const MONITORING_REF = 'STIF:StopArea:SP:70640:'; 
    let lastTimes = {};
    let currentTrainsKeys = []; // Stocke les identifiants uniques des trains affichés

    function updateClock() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'});
    }

    function formatDestination(text) {
        let clean = text.replace(/GARE DE /gi, '').trim().toLowerCase();
        if (clean === "cergy le haut") return "Cergy - Le Haut";
        return clean.split(/([ -])/).map(part => {
            if (part === " " || part === "-") return part;
            const exceptions = ["de", "la", "le"];
            if (exceptions.includes(part) && clean.indexOf(part) !== 0 && !clean.includes("le haut")) return part;
            return part.charAt(0).toUpperCase() + part.slice(1);
        }).join('');
    }

    async function fetchSchedules() {
        const debug = document.getElementById('debug');
        const url = `https://prim.iledefrance-mobilites.fr/marketplace/stop-monitoring?MonitoringRef=${MONITORING_REF}`;
        const proxy = `https://corsproxy.io/?${encodeURIComponent(url)}`;

        try {
            const response = await fetch(proxy, {
                method: 'GET',
                headers: { 'apiKey': API_KEY, 'Accept': 'application/json' }
            });
            const data = await response.json();
            const visits = data.Siri?.ServiceDelivery?.StopMonitoringDelivery?.[0]?.MonitoredStopVisit || [];
            
            processData(visits);
            debug.innerText = `> Flux OK - ${new Date().toLocaleTimeString()}`;
        } catch (e) {
            debug.innerText = "> ÉCHEC : " + e.message;
        }
    }

    function processData(visits) {
        const now = new Date();
        const seen = new Set();
        
        let newTrains = visits
            .map(v => v.MonitoredVehicleJourney)
            .filter(j => {
                const line = j.LineRef?.value || "";
                if (!line.includes('C01742') && line !== 'A') return false;
                const aimedTime = j.MonitoredCall.AimedDepartureTime;
                const destName = j.DestinationName[0].value;
                const uniqueKey = `${destName}_${aimedTime}`;
                if (seen.has(uniqueKey)) return false;
                seen.add(uniqueKey);
                const expTime = new Date(j.MonitoredCall.ExpectedDepartureTime || j.MonitoredCall.AimedDepartureTime);
                const isAtStop = j.MonitoredCall.VehicleAtStop === true || j.MonitoredCall.VehicleAtStop === "true";
                if (!isAtStop && (expTime - now) < -15000) return false;
                return !destName.toLowerCase().includes('boissy') && !destName.toLowerCase().includes('varenne');
            })
            .sort((a, b) => {
                const tA = new Date(a.MonitoredCall.ExpectedDepartureTime || a.MonitoredCall.AimedDepartureTime);
                const tB = new Date(b.MonitoredCall.ExpectedDepartureTime || b.MonitoredCall.AimedDepartureTime);
                return tA - tB;
            })
            .slice(0, 7);

        const newKeys = newTrains.map(t => `${t.JourneyNote?.[0]?.value || '----'}_${t.MonitoredCall.AimedDepartureTime}`);

        // Détection : est-ce que le premier train a changé (est parti) ?
        if (currentTrainsKeys.length > 0 && newKeys.length > 0 && currentTrainsKeys[0] !== newKeys[0]) {
            const firstRow = document.querySelector('.row');
            if (firstRow) {
                firstRow.classList.add('row-exit');
                // On attend la fin de l'anim (600ms) avant de rerendre le tableau
                setTimeout(() => {
                    render(newTrains);
                    currentTrainsKeys = newKeys;
                }, 600);
                return;
            }
        }

        render(newTrains);
        currentTrainsKeys = newKeys;
    }

    function render(trains) {
        const board = document.getElementById('board');
        const now = new Date();

        if (trains.length === 0) {
            board.innerHTML = '<div style="text-align:center;margin-top:100px;color:#999;">Aucun train détecté.</div>';
            return;
        }

        let html = '';
        trains.forEach((j, index) => {
            const dest = formatDestination(j.DestinationName[0].value);
            const mission = j.JourneyNote?.[0]?.value || "----";
            const time = new Date(j.MonitoredCall.ExpectedDepartureTime || j.MonitoredCall.AimedDepartureTime);
            const diff = Math.round((time - now) / 60000);
            const uniqueKeyForMem = `${mission}_${j.MonitoredCall.AimedDepartureTime}`;

            const platformData = j.MonitoredCall.DeparturePlatformName;
            const platform = (platformData && typeof platformData === 'object') ? platformData.value : (platformData || "2");
            const isAtStop = j.MonitoredCall.VehicleAtStop === true || j.MonitoredCall.VehicleAtStop === "true";

            let currentStatus = "";
            let timeHTML = "";
            let statusClass = "";
            
            if (isAtStop) {
                currentStatus = "QUAI";
                timeHTML = `<span class="full-text">À quai</span>`;
            } else if (diff <= 0) {
                currentStatus = "APPROCHE";
                timeHTML = `<span class="full-text">À l'approche</span>`;
                statusClass = "blinking";
            } else {
                currentStatus = `${diff}`;
                timeHTML = `<span class="val">${diff}</span><span class="unit">min</span>`;
            }

            const hasChanged = lastTimes[uniqueKeyForMem] !== undefined && lastTimes[uniqueKeyForMem] !== currentStatus;
            const animTextClass = hasChanged ? 'animate-text' : '';
            lastTimes[uniqueKeyForMem] = currentStatus;

            html += `
                <div class="row row-animate-in">
                    <div class="mission">${mission}</div>
                    <div class="dest">${dest}</div>
                    <div class="time">
                        <div class="time-wrapper ${statusClass} ${animTextClass}">
                            ${timeHTML}
                        </div>
                    </div>
                    <div class="platform">
                        <div class="platform-box">
                            <span class="platform-text">Quai</span>
                            <span class="platform-num">${platform}</span>
                        </div>
                    </div>
                </div>`;
        });
        board.innerHTML = html;
    }

    setInterval(updateClock, 1000);
    updateClock();
    fetchSchedules();
    setInterval(fetchSchedules, 10000);
</script>
</body>
</html>
