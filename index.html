<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SIEL RER A - Joinville-le-Pont</title>
    <link href="https://fonts.googleapis.com/css2?family=Cabin:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --red-a: #CE283C; 
            --dark: #000000;
            --yellow: #fbc02d; 
            --bg-page: #f5f5f5;
            --ok-color: #00ff00;
            --ko-color: #ff4444;
            --loading-color: #F59E0B;
            --info-bg: #d0dce4;
            --info-text: #1a3144;
        }
        body { background: var(--bg-page); font-family: 'Cabin', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: white; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 8px solid var(--red-a); z-index: 10; }
        .header-left { display: flex; align-items: center; }
        .logos-container { display: flex; gap: 8px; align-items: center; }
        .logo-rer-pill { background: white; border: 2.5px solid var(--dark); border-radius: 8px; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: bold; color: var(--dark); }
        .header-line-logo { width: 48px; height: 48px; }

        .station-name { font-size: 26px; font-weight: bold; color: var(--dark); margin-left: 15px; }
        .clock { background: var(--dark); color: var(--yellow); padding: 10px 22px; border-radius: 8px; font-size: 28px; font-weight: bold; }
        
        .board { flex-grow: 1; padding: 0 20px; display: flex; flex-direction: column; }
        .row { display: grid; grid-template-columns: 100px 1fr 220px 100px; align-items: center; padding: 15px 0; border-bottom: 2px solid #ddd; height: 70px; }
        .mission { background: #ddd; padding: 6px; border-radius: 4px; text-align: center; font-weight: bold; font-family: monospace; font-size: 16px; }
        .dest { font-size: 28px; font-weight: 700; padding-left: 15px; color: var(--dark); }
        .time { background: var(--dark); color: var(--yellow); border-radius: 8px; text-align: center; width: 190px; height: 60px; display: flex; justify-content: center; align-items: center; font-size: 32px; font-weight: bold; }
        .unit { font-size: 14px; margin-left: 4px; text-transform: lowercase; }

        .info-trafic { background: var(--info-bg); height: 110px; display: flex; align-items: center; padding: 0 30px; border-top: 2px solid #b8c5ce; }
        .info-icon-container { margin-right: 35px; flex-shrink: 0; }
        .icon-info-blue { width: 45px; height: 45px; background: white; border: 3px solid #1a3144; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; color: #1a3144; }
        
        /* Conteneur pour afficher l'icône extraite du sprite */
        .line-icon-display { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; position: relative; }
        .line-icon-display svg { width: 100%; height: 100%; }
        .badge-status { position: absolute; bottom: -5px; right: -5px; width: 22px; height: 22px; border-radius: 5px; border: 2px solid var(--info-bg); }

        .info-text { font-size: 24px; font-weight: 700; color: var(--info-text); flex-grow: 1; }
        .blinking { animation: blinker 1.2s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

        footer { background: #333; color: #aaa; padding: 10px 20px; font-family: monospace; font-size: 11px; display: flex; justify-content: space-between; }
        .api-ok { color: var(--ok-color); font-weight: bold; }
        .api-ko { color: var(--ko-color); font-weight: bold; }
        .api-loading { color: var(--loading-color); font-weight: bold; }
        
        /* Cacher le sprite SVG global */
        #svg-sprite-container { display: none; }
    </style>
</head>
<body>

<div id="svg-sprite-container"></div>

<header>
    <div class="header-left">
        <div class="logos-container">
            <div class="logo-rer-pill">RER</div>
            <div id="header-logo-rer-a" class="header-line-logo"></div>
        </div>
        <div class="station-name">JOINVILLE-LE-PONT</div>
    </div>
    <div class="clock" id="clock">--:--</div>
</header>

<div class="board" id="board"></div>

<div class="info-trafic">
    <div class="info-icon-container" id="info-icon-box">
        <div id="icon-standard" class="icon-info-blue">i</div>
    </div>
    <div class="info-text" id="traffic-message">Chargement du sprite des logos...</div>
</div>

<footer>
    <div id="debug-schedules">> SIEL : Attente...</div>
    <div style="display: flex; gap: 20px;">
        <div id="debug-traffic">Info Trafic : --</div>
        <div id="debug-indices">Génération des indices de lignes : --</div>
    </div>
</footer>

<script>
    const API_KEY_MAIN = '2pz4kMqzVx2zneQWOTnOrqM6muPE1XVO';
    const API_KEY_LOGOS = 'F2uOuFqwSrN1o5t1yAnV4XDDVUOh3Lso'; // Clé à 10 appels/jour
    
    const LINE_MAP = {
        'C01742': 'A', 'C01743': 'B', 'C01744': 'C', 'C01745': 'D', 'C01746': 'E',
        'C01371': '1', 'C01372': '2', 'C01373': '3', 'C01374': '4', 'C01375': '5', 'C01376': '6',
        'C01377': '7', 'C01378': '8', 'C01379': '9', 'C01380': '10', 'C01381': '11', 'C01382': '12',
        'C01383': '13', 'C01384': '14'
    };

    let displayQueue = [{text: "Attentifs, ensemble • Signalez tout objet abandonné", type: 'default'}];
    let queueIndex = 0;
    const proxy = (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;

    // --- LOGIQUE SPRITE & STOCKAGE ---

    async function initLogosSprite() {
        const debug = document.getElementById('debug-indices');
        const container = document.getElementById('svg-sprite-container');
        
        // 1. Essayer de charger depuis le stockage local
        const cachedSprite = localStorage.getItem('prim_sprite_logos');
        if (cachedSprite) {
            container.innerHTML = cachedSprite;
            debug.innerHTML = `<span class="api-ok">OK (Cache)</span>`;
            updateHeaderLogo();
            return;
        }

        // 2. Sinon, faire l'unique appel API de la journée
        debug.innerHTML = `<span class="api-loading">Chargement Sprite...</span>`;
        const lineIds = Object.keys(LINE_MAP).join(',');
        const url = `https://prim.iledefrance-mobilites.fr/marketplace/ilico/getIcon/sprite?lineIds=${lineIds}&format=sprite`;

        try {
            const response = await fetch(proxy(url), { headers: { 'apikey': API_KEY_LOGOS } });
            if (response.ok) {
                const svgSprite = await response.text();
                // Stockage permanent
                localStorage.setItem('prim_sprite_logos', svgSprite);
                container.innerHTML = svgSprite;
                debug.innerHTML = `<span class="api-ok">OK (API)</span>`;
                updateHeaderLogo();
            } else {
                debug.innerHTML = `<span class="api-ko">Erreur ${response.status}</span>`;
            }
        } catch (e) {
            debug.innerHTML = `<span class="api-ko">Erreur Réseau</span>`;
        }
    }

    // Fonction pour générer le code HTML d'un logo à partir du sprite
    function getLogoHTML(lineId) {
        // L'API Sprite utilise des ID au format "STIF_Line__ID_" ou proche. 
        // On utilise la balise <use> pour cloner l'élément du sprite.
        return `<svg viewBox="0 0 100 100" class="line-icon-svg">
                    <use xlink:href="#${lineId}"></use>
                </svg>`;
    }

    function updateHeaderLogo() {
        document.getElementById('header-logo-rer-a').innerHTML = getLogoHTML('C01742');
    }

    // --- TRAFIC & HORAIRES ---

    async function fetchTraffic() {
        const debug = document.getElementById('debug-traffic');
        let newQueue = [{text: "Attentifs, ensemble • Signalez tout objet abandonné", type: 'default'}];
        
        try {
            // Pour l'exemple, on boucle sur quelques lignes pour ne pas saturer
            const linesToTrack = ['C01742', 'C01371', 'C01374', 'C01384']; 
            for (const id of linesToTrack) {
                const url = `https://prim.iledefrance-mobilites.fr/marketplace/general-message?LineRef=STIF:Line::${id}:`;
                const res = await fetch(proxy(url), { headers: { 'apikey': API_KEY_MAIN } });
                if (res.ok) {
                    const data = await res.json();
                    const messages = data.Siri?.ServiceDelivery?.GeneralMessageDelivery?.[0]?.InfoMessage || [];
                    messages.forEach(m => {
                        const text = m.Content?.Message[0]?.MessageText?.value;
                        if (text) newQueue.push({text, type: 'incident', lineId: id});
                    });
                }
            }
            displayQueue = newQueue;
            debug.innerHTML = `<span class="api-ok">OK</span>`;
        } catch (e) { debug.innerHTML = `<span class="api-ko">HS</span>`; }
    }

    function rotateMessage() {
        const txt = document.getElementById('traffic-message');
        const iconBox = document.getElementById('info-icon-box');
        
        if (queueIndex >= displayQueue.length) queueIndex = 0;
        const current = displayQueue[queueIndex];

        if (current.type === 'default') {
            iconBox.innerHTML = `<div class="icon-info-blue">i</div>`;
        } else {
            const badgeColor = current.text.toLowerCase().includes('travaux') ? '#CA553C' : '#F2C94C';
            iconBox.innerHTML = `
                <div class="line-icon-display">
                    ${getLogoHTML(current.lineId)}
                    <div class="badge-status blinking" style="background:${badgeColor}"></div>
                </div>`;
        }

        txt.innerText = current.text;
        queueIndex++;
    }

    async function fetchSchedules() {
        const debug = document.getElementById('debug-schedules');
        const url = `https://prim.iledefrance-mobilites.fr/marketplace/stop-monitoring?MonitoringRef=STIF:StopArea:SP:70640:`;
        try {
            const res = await fetch(proxy(url), { headers: { 'apikey': API_KEY_MAIN } });
            const data = await res.json();
            const visits = data.Siri?.ServiceDelivery?.StopMonitoringDelivery[0].MonitoredStopVisit || [];
            
            let html = '';
            visits.slice(0, 6).forEach(v => {
                const j = v.MonitoredVehicleJourney;
                const time = new Date(j.MonitoredCall.ExpectedDepartureTime || j.MonitoredCall.AimedDepartureTime);
                const diff = Math.max(0, Math.round((time - new Date()) / 60000));
                html += `
                    <div class="row">
                        <div class="mission">${j.JourneyNote?.[0]?.value || '---'}</div>
                        <div class="dest">${j.DestinationName[0].value.replace('GARE DE ', '')}</div>
                        <div class="time">${diff}<span class="unit">min</span></div>
                        <div style="font-weight:bold;text-align:center;">${j.MonitoredCall.DeparturePlatformName?.value || ''}</div>
                    </div>`;
            });
            document.getElementById('board').innerHTML = html;
            debug.innerHTML = `> SIEL OK - ${new Date().toLocaleTimeString()}`;
        } catch (e) { debug.innerHTML = `<span class="api-ko">> SIEL HS</span>`; }
    }

    // --- LANCEMENT ---
    
    initLogosSprite(); // Appelé une seule fois, utilise le cache.
    
    fetchSchedules();
    setInterval(fetchSchedules, 30000);

    fetchTraffic();
    setInterval(fetchTraffic, 300000);
    
    setInterval(rotateMessage, 5000);
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
    }, 1000);
</script>

</body>
</html>
