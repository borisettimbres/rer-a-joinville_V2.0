<script>
    const API_KEY = '2pz4kMqzVx2zneQWOTnOrqM6muPE1XVO';
    const MONITORING_REF = 'STIF:StopArea:SP:70640:'; 
    
    let currentTrainsData = [];
    let isAnimating = false;
    const DEFAULT_MSG = "Attentifs, ensemble • Ne pas se séparer de ses effets personnels • Signaler tout objet abandonné ou situation inhabituelle";

    function updateClock() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'});
    }

    /**
     * Consomme l'API "Messages affichés sur les écrans"
     * Filtre spécifiquement pour le Métro et le RER
     */
    async function fetchGlobalTraffic() {
        const debugNode = document.getElementById('debug-traffic');
        const txtNode = document.getElementById('traffic-message');
        const iconStd = document.getElementById('icon-standard');
        const iconInc = document.getElementById('icon-incident');

        // URL de l'API SIRI-SX (General Message)
        const url = `https://prim.iledefrance-mobilites.fr/marketplace/general-message`;
        const proxy = `https://corsproxy.io/?${encodeURIComponent(url)}`;
        
        try {
            const response = await fetch(proxy, { 
                headers: { 'apikey': API_KEY, 'Accept': 'application/json' } 
            });
            if (!response.ok) throw new Error("Erreur API");
            
            const data = await response.json();
            const messages = data.Siri?.ServiceDelivery?.GeneralMessageDelivery?.[0]?.InfoMessage || [];
            
            // FILTRAGE : Uniquement Métro (C013) et RER (C017)
            const trafficIncidents = messages.filter(m => {
                const lineRefs = m.AffectedComponents?.AffectedLine || [];
                const isMetroOrRER = lineRefs.some(line => 
                    line.LineRef?.value.includes('STIF:Line::C013') || // Métros
                    line.LineRef?.value.includes('STIF:Line::C017')    // RER
                );
                
                const channel = m.InfoChannelRef?.value || "";
                // On garde si c'est du métro/RER ET que c'est une perturbation réelle (pas juste de la pub)
                return isMetroOrRER && channel === "BusinessDisruption";
            });

            if (trafficIncidents.length > 0) {
                // On extrait le texte et on nettoie les doublons
                const uniqueMessages = [...new Set(trafficIncidents.map(i => i.Content.Message[0].MessageText.value))];
                const fullText = uniqueMessages.join(' ••• ');
                
                // Formatage des heures en blanc sur fond noir (style SIEL)
                const formatted = fullText.replace(/(\d{1,2}h\d{2}|\d{1,2}:\d{2})/g, '<span class="time-box">$1</span>');
                
                txtNode.innerHTML = formatted + " — " + formatted;
                txtNode.classList.add('marquee');
                iconStd.style.display = 'none';
                iconInc.style.display = 'block';
            } else {
                // Retour au message par défaut si trafic fluide
                txtNode.innerHTML = DEFAULT_MSG;
                txtNode.classList.remove('marquee');
                iconStd.style.display = 'flex';
                iconInc.style.display = 'none';
            }
            debugNode.innerHTML = '<span class="api-ok">API TRAFFIC : OK</span>';
        } catch (e) {
            console.error("Erreur Traffic:", e);
            debugNode.innerHTML = '<span class="api-ko">API TRAFFIC : HS</span>';
        }
    }

    // --- FONCTIONS SIEL (Horaires des trains) ---

    function formatDestination(text) {
        let clean = text.replace(/GARE DE /gi, '').trim().toLowerCase();
        if (clean === "cergy le haut") return "Cergy - Le Haut";
        return clean.split(/([ -])/).map(part => {
            if (part === " " || part === "-") return part;
            const exceptions = ["de", "la", "le"];
            if (exceptions.includes(part) && clean.indexOf(part) !== 0 && !clean.includes("le haut")) return part;
            return part.charAt(0).toUpperCase() + part.slice(1);
        }).join('');
    }

    async function fetchSchedules() {
        if (isAnimating) return;
        const debug = document.getElementById('debug-schedules');
        const url = `https://prim.iledefrance-mobilites.fr/marketplace/stop-monitoring?MonitoringRef=${MONITORING_REF}`;
        const proxy = `https://corsproxy.io/?${encodeURIComponent(url)}`;
        try {
            const response = await fetch(proxy, { headers: { 'apiKey': API_KEY, 'Accept': 'application/json' } });
            const data = await response.json();
            const visits = data.Siri?.ServiceDelivery?.StopMonitoringDelivery?.[0]?.MonitoredStopVisit || [];
            processUpdate(visits);
            debug.innerText = `> SIEL OK - ${new Date().toLocaleTimeString()}`;
        } catch (e) {
            debug.innerText = "> SIEL KO";
        }
    }

    function processUpdate(visits) {
        const seen = new Set();
        let newTrains = visits.map(v => v.MonitoredVehicleJourney).filter(j => {
            const line = j.LineRef?.value || "";
            if (!line.includes('C01742') && line !== 'A') return false;
            const aimedTime = j.MonitoredCall.AimedDepartureTime;
            const uniqueKey = `${j.DestinationName[0].value}_${aimedTime}`;
            if (seen.has(uniqueKey)) return false;
            seen.add(uniqueKey);
            return !j.DestinationName[0].value.toLowerCase().includes('boissy') && !j.DestinationName[0].value.toLowerCase().includes('varenne');
        }).sort((a, b) => new Date(a.MonitoredCall.ExpectedDepartureTime || a.MonitoredCall.AimedDepartureTime) - new Date(b.MonitoredCall.ExpectedDepartureTime || b.MonitoredCall.AimedDepartureTime)).slice(0, 7);

        if (currentTrainsData.length > 0 && newTrains.length > 0) {
            if (currentTrainsData[0].FramedVehicleJourneyRef?.DatedVehicleJourneyRef !== newTrains[0].FramedVehicleJourneyRef?.DatedVehicleJourneyRef) {
                triggerDepartureAnimation(newTrains);
                return;
            }
        }
        render(newTrains);
    }

    function triggerDepartureAnimation(newTrains) {
        const firstRow = document.querySelector('.row');
        if (firstRow) {
            isAnimating = true;
            firstRow.classList.add('exit-left');
            setTimeout(() => { render(newTrains); isAnimating = false; }, 600);
        } else { render(newTrains); }
    }

    function render(trains) {
        const board = document.getElementById('board');
        const now = new Date();
        let html = '';
        if (trains.length === 0) { 
            board.innerHTML = '<div style="text-align:center;margin-top:100px;color:#999;">Aucun train détecté.</div>'; 
            currentTrainsData = []; 
            return; 
        }
        
        trains.forEach(j => {
            const dest = formatDestination(j.DestinationName[0].value);
            const mission = j.JourneyNote?.[0]?.value || "----";
            const time = new Date(j.MonitoredCall.ExpectedDepartureTime || j.MonitoredCall.AimedDepartureTime);
            const diff = Math.round((time - now) / 60000);
            const isAtStop = j.MonitoredCall.VehicleAtStop === true || j.MonitoredCall.VehicleAtStop === "true";
            
            let timeHTML = (isAtStop) ? '<span class="full-text">À quai</span>' : (diff <= 0 ? '<span class="full-text">À l\'approche</span>' : `<span class="val">${diff}</span><span class="unit">min</span>`);
            let statusClass = (diff <= 0 && !isAtStop) ? 'blinking' : '';
            
            const isNewRow = !currentTrainsData.some(old => old.FramedVehicleJourneyRef?.DatedVehicleJourneyRef === j.FramedVehicleJourneyRef?.DatedVehicleJourneyRef);
            
            const platformData = j.MonitoredCall.DeparturePlatformName;
            const rawPlatform = (platformData && typeof platformData === 'object') ? platformData.value : platformData;
            let platformHTML = '<div class="platform"></div>';
            if (rawPlatform && rawPlatform !== "unknown" && rawPlatform !== "") {
                platformHTML = `<div class="platform"><div class="platform-box"><span class="platform-text">Quai</span><span class="platform-num">${rawPlatform}</span></div></div>`;
            }

            html += `<div class="row ${isNewRow ? 'new-row' : ''}">
                <div class="mission">${mission}</div>
                <div class="dest">${dest}</div>
                <div class="time"><div class="time-wrapper ${statusClass}">${timeHTML}</div></div>
                ${platformHTML}
            </div>`;
        });
        board.innerHTML = html;
        currentTrainsData = trains;
    }

    // Initialisation
    setInterval(updateClock, 1000);
    updateClock();

    // Fréquence SIEL (Horaires quai) : toutes les 15s
    fetchSchedules();
    setInterval(fetchSchedules, 15000);

    // Fréquence Info Trafic : toutes les 60s (optimal pour PRIM)
    fetchGlobalTraffic();
    setInterval(fetchGlobalTraffic, 60000);
</script>
