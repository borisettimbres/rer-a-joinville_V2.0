<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SIEL RER A - Joinville-le-Pont</title>
    <link href="https://fonts.googleapis.com/css2?family=Cabin:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --red-a: #c0333a; 
            --blue-rer: #0055c8;
            --dark: #222; 
            --yellow: #fbc02d; 
        }
        body { background: #f5f5f5; font-family: 'Cabin', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* HEADER AVEC LOGOS */
        header { background: white; padding: 10px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 8px solid var(--red-a); }
        
        .header-left { display: flex; align-items: center; }
        
        .logos-container { display: flex; gap: 10px; align-items: center; }
        
        .logo-rer {
            background: var(--blue-rer);
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 900;
            color: white;
        }
        
        .logo-a {
            background: var(--red-a);
            border-radius: 10px;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 900;
            color: white;
        }
        
        .station-info { margin-left: 20px; }
        .station-name { font-size: 24px; font-weight: bold; line-height: 1; }
        .direction-info { font-size: 14px; color: var(--red-a); margin-top: 4px; }
        
        .clock { background: var(--dark); color: white; padding: 10px 20px; border-radius: 8px; font-size: 28px; }
        
        /* TABLEAU DE BORD */
        .board { flex-grow: 1; padding: 20px; overflow-y: auto; }
        
        .row { 
            display: grid; 
            grid-template-columns: 100px 1fr 100px 160px; 
            align-items: center; 
            padding: 18px 0; 
            border-bottom: 2px solid #ddd; 
        }
        
        .mission { background: #ddd; padding: 5px; border-radius: 4px; text-align: center; font-weight: bold; font-family: monospace; }
        .dest { font-size: 26px; font-weight: 700; text-transform: uppercase; padding-left: 15px; }
        
        .platform {
            text-align: center;
            border-left: 1px solid #ccc;
        }
        .platform-label { font-size: 10px; text-transform: uppercase; color: #999; display: block; }
        .platform-num { font-weight: bold; font-size: 28px; color: var(--dark); }

        .time { 
            background: var(--dark); 
            color: var(--yellow); 
            border-radius: 6px; 
            text-align: center; 
            padding: 8px; 
            min-width: 140px;
            min-height: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-left: 15px;
        }
        .time .val { font-size: 32px; font-weight: bold; display: block; line-height: 0.8; }
        .time .unit { font-size: 12px; }
        .time .full-text { font-size: 16px; font-weight: bold; line-height: 1.1; text-transform: uppercase; }

        footer { background: #333; color: #0f0; padding: 10px 20px; font-family: monospace; font-size: 11px; }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <div class="logos-container">
            <div class="logo-rer">RER</div>
            <div class="logo-a">A</div>
        </div>
        <div class="station-info">
            <div class="station-name">JOINVILLE-LE-PONT</div>
            <div class="direction-info">DIRECTION PARIS / OUEST</div>
        </div>
    </div>
    <div class="clock" id="clock">--:--</div>
</header>

<div class="board" id="board">
    <div style="text-align:center; margin-top:100px; color:#999;" id="status">Initialisation du flux...</div>
</div>

<footer id="debug">Prêt.</footer>

<script>
    const API_KEY = '2pz4kMqzVx2zneQWOTnOrqM6muPE1XVO';
    const MONITORING_REF = 'STIF:StopArea:SP:70640:'; 

    function updateClock() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'});
    }

    async function fetchSchedules() {
        const debug = document.getElementById('debug');
        const url = `https://prim.iledefrance-mobilites.fr/marketplace/stop-monitoring?MonitoringRef=${MONITORING_REF}`;
        const proxy = `https://corsproxy.io/?${encodeURIComponent(url)}`;

        try {
            const response = await fetch(proxy, {
                method: 'GET',
                headers: { 'apiKey': API_KEY, 'Accept': 'application/json' }
            });
            if (!response.ok) throw new Error("Erreur " + response.status);
            const data = await response.json();
            const visits = data.Siri?.ServiceDelivery?.StopMonitoringDelivery?.[0]?.MonitoredStopVisit || [];
            render(visits);
            debug.innerText = `> Flux OK - ${new Date().toLocaleTimeString()}`;
        } catch (e) {
            debug.innerText = "> ÉCHEC : " + e.message;
        }
    }

    function render(visits) {
        const board = document.getElementById('board');
        const now = new Date();
        const seen = new Set();
        
        let trains = visits
            .map(v => v.MonitoredVehicleJourney)
            .filter(j => {
                const line = j.LineRef?.value || "";
                if (!line.includes('C01742') && line !== 'A') return false;

                const aimedTime = j.MonitoredCall.AimedDepartureTime;
                const destName = j.DestinationName[0].value;
                const uniqueKey = `${destName}_${aimedTime}`;

                if (seen.has(uniqueKey)) return false;
                seen.add(uniqueKey);

                const d = destName.toLowerCase();
                return !d.includes('boissy') && !d.includes('varenne');
            })
            .sort((a, b) => {
                const tA = new Date(a.MonitoredCall.ExpectedDepartureTime || a.MonitoredCall.AimedDepartureTime);
                const tB = new Date(b.MonitoredCall.ExpectedDepartureTime || b.MonitoredCall.AimedDepartureTime);
                return tA - tB;
            });

        if (trains.length === 0) {
            board.innerHTML = '<div style="text-align:center;margin-top:100px;color:#999;">Aucun train détecté vers Paris.</div>';
            return;
        }

        let html = '';
        trains.slice(0, 7).forEach(j => {
            const dest = j.DestinationName[0].value.toUpperCase().replace('GARE DE ', '').trim();
            const mission = j.JourneyNote?.[0]?.value || "----";
            const time = new Date(j.MonitoredCall.ExpectedDepartureTime || j.MonitoredCall.AimedDepartureTime);
            const diff = Math.round((time - now) / 60000);
            
            const platform = j.MonitoredCall.DeparturePlatformName || "2";
            const isAtStop = j.MonitoredCall.VehicleAtStop === true || j.MonitoredCall.VehicleAtStop === "true";

            let timeHTML = '';
            if (isAtStop) {
                timeHTML = `<span class="full-text">À quai</span>`;
            } else if (diff <= 0) {
                timeHTML = `<span class="full-text">À l'approche</span>`;
            } else {
                timeHTML = `<span class="val">${diff}</span><span class="unit">min</span>`;
            }

            html += `
                <div class="row">
                    <div class="mission">${mission}</div>
                    <div class="dest">${dest}</div>
                    <div class="platform">
                        <span class="platform-label">Voie</span>
                        <span class="platform-num">${platform}</span>
                    </div>
                    <div class="time">${timeHTML}</div>
                </div>`;
        });
        board.innerHTML = html;
    }

    setInterval(updateClock, 1000);
    updateClock();
    fetchSchedules();
    setInterval(fetchSchedules, 30000);
</script>
</body>
</html>
